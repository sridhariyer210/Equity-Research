amcs:
  - id: nippon
    name: Nippon India Mutual Fund
    file_pattern: multi_tab        # One Excel file contains all Nippon funds across tabs
    download_method: manual        # "direct" | "selenium" | "manual"
    base_url: "https://mf.nipponindiaim.com/investor-service/downloads/factsheet-portfolio-and-other-disclosures"
    # CSS selectors for Selenium web scraping (not used for manual method)
    selectors:
      link_text_pattern: "FACTSHEET PORTFOLIO AND OTHER"  # Partial match of link text
      link_selector: "a"  # CSS selector for download link
      wait_element: "body"    # Element to wait for before scraping

