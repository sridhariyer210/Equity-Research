funds:
  - id: nippon_small_cap
    name: Nippon India Small Cap Fund
    cap_category: small_cap
    amfi_code: "INF123"
    amc_id: nippon
    sheet_name: "Small Cap Fund"   # Tab name inside Nippon's multi-tab Excel
    is_active: true

