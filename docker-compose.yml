version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: mftracker
      POSTGRES_PASSWORD: mftracker
      POSTGRES_DB: mf_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://mftracker:mftracker@db:5432/mf_tracker
    depends_on:
      - db
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
